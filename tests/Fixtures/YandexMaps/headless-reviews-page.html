<!DOCTYPE html>
<html>
<head>
    <title>Koferoom</title>
</head>
<body>
    <h1 itemprop="name">Koferoom</h1>
    <div aria-label="Отзывы, 145"></div>
    <div class="business-rating-amount-view">145 оценок</div>
    <div class="business-summary-rating-badge-view__rating-text">4</div>
    <div class="business-summary-rating-badge-view__rating-text">.</div>
    <div class="business-summary-rating-badge-view__rating-text">8</div>

    <div class="scroll__container">
        <!-- Review 1 -->
        <div class="business-review-view">
            <div class="business-review-view__link">
                <span itemprop="name">Кирилл Дмитриев</span>
            </div>
            <div class="business-review-view__header">
                <div class="business-review-view__rating">
                    <span itemprop="reviewRating">
                        <meta itemprop="bestRating" content="5.0">
                    </span>
                </div>
            </div>
            <div class="business-review-view__date">
                <meta itemprop="datePublished" content="2023-10-15T12:00:00Z">
            </div>
            <div class="spoiler-view__text-container">
                Отличный кофе и атмосфера!
            </div>
            <div class="business-reactions-view__container" aria-label="Лайк">
                <span class="business-reactions-view__counter">12</span>
            </div>
            <div class="business-reactions-view__container" aria-label="Дизлайк">
                <span class="business-reactions-view__counter">1</span>
            </div>
        </div>

        <!-- Review 2: Missing likes/dislikes -->
        <div class="business-review-view">
            <div class="business-review-view__link">
                <span itemprop="name">Наталья</span>
            </div>
            <div class="business-review-view__header">
                <div class="business-review-view__rating">
                    <span itemprop="reviewRating">
                        <meta itemprop="bestRating" content="4.0">
                    </span>
                </div>
            </div>
            <div class="business-review-view__date">
                <meta itemprop="datePublished" content="2023-10-16T14:30:00Z">
            </div>
            <div class="spoiler-view__text-container">
                Хорошо, но бывает людно.
            </div>
        </div>
    </div>
</body>
</html>
