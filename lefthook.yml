pre-push:
  parallel: true
  jobs:
    - name: lint frontend
      tags:
        - frontend
      run: pnpm lint

    - name: check types
      tags:
        - frontend
      run: pnpm lint:types

    - name: run backend tests
      tags:
        - backend
      run: php artisan test

    - name: lint backend
      tags:
        - backend
      run: vendor/bin/pint --test -v
